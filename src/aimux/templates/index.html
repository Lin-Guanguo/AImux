<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AImux</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1b26; --surface: #24283b; --border: #3b4261;
  --text: #c0caf5; --dim: #565f89; --accent: #7aa2f7;
  --green: #9ece6a; --yellow: #e0af68; --red: #f7768e; --cyan: #7dcfff;
}
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
header button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
header button:hover { border-color: var(--accent); }
.mode-indicator { font-size: 11px; color: var(--dim); }
.main { display: flex; flex: 1; min-height: 0; }

/* Sidebar */
.sidebar { width: 260px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 8px 0; }
.sess-name { padding: 4px 12px; font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
.sess-name:first-child { margin-top: 0; }
.win-label { padding: 2px 12px 2px 20px; font-size: 11px; color: var(--dim); }
.pane-item { padding: 6px 12px 6px 28px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; }
.pane-item:hover { background: var(--surface); }
.pane-item.active { background: var(--surface); border-left-color: var(--accent); }
.pane-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.idle { background: var(--green); }
.dot.generating { background: var(--yellow); animation: pulse 1s infinite; }
.dot.waiting_input { background: var(--red); animation: pulse 0.6s infinite; }
.dot.unknown { background: var(--dim); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.pane-item .pane-id { color: var(--cyan); font-family: monospace; font-size: 12px; }
.pane-item .pane-agent { color: var(--dim); font-size: 11px; }

/* Content area */
.content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.pane-header { padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--dim); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.pane-header .state-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.state-badge.idle { background: rgba(158,206,106,0.15); color: var(--green); }
.state-badge.generating { background: rgba(224,175,104,0.15); color: var(--yellow); }
.state-badge.waiting_input { background: rgba(247,118,142,0.15); color: var(--red); }
.state-badge.unknown { background: rgba(86,95,137,0.15); color: var(--dim); }

/* Text mode terminal */
.terminal-text { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; background: var(--bg); min-height: 0; }
.terminal-text.empty { display: flex; align-items: center; justify-content: center; color: var(--dim); font-family: system-ui; }

/* xterm.js container */
#xterm-container { flex: 1; min-height: 0; padding: 4px; display: none; overflow: auto; }

/* JSON/Conversation view */
#jsonl-view { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: none; }
.conv-msg { margin-bottom: 16px; border-radius: 8px; padding: 12px 16px; }
.conv-msg.user { background: rgba(122,162,247,0.10); border-left: 3px solid var(--accent); }
.conv-msg.assistant { background: rgba(158,206,106,0.08); border-left: 3px solid var(--green); }
.conv-msg.system { background: rgba(86,95,137,0.12); border-left: 3px solid var(--dim); }
.conv-role { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.conv-role.user { color: var(--accent); }
.conv-role.assistant { color: var(--green); }
.conv-role.system { color: var(--dim); }
.conv-body { font-size: 13px; line-height: 1.6; }
.conv-body p { margin: 0 0 8px 0; }
.conv-body p:last-child { margin-bottom: 0; }
.conv-body pre { background: rgba(0,0,0,0.3); padding: 10px 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; font-size: 12px; }
.conv-body code { background: rgba(0,0,0,0.25); padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: "JetBrains Mono", monospace; }
.conv-body pre code { background: none; padding: 0; }
.conv-body ul, .conv-body ol { padding-left: 20px; margin: 6px 0; }
.conv-body h1, .conv-body h2, .conv-body h3 { margin: 8px 0 4px; font-size: 14px; color: var(--text); }
.conv-body blockquote { border-left: 2px solid var(--border); padding-left: 10px; color: var(--dim); margin: 6px 0; }
.conv-tools { margin-top: 8px; }
.conv-tool { display: inline-block; background: rgba(187,154,247,0.12); color: #bb9af7; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: monospace; margin: 2px 4px 2px 0; }
.conv-tool-preview { color: var(--dim); font-size: 11px; margin-top: 2px; word-break: break-all; }
.jsonl-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--dim); font-family: system-ui; }
.jsonl-meta { font-size: 11px; color: var(--dim); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* Controls */
.controls { border-top: 1px solid var(--border); padding: 10px 16px; flex-shrink: 0; }
.quick-btns { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.quick-btns button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px; }
.quick-btns button:hover { border-color: var(--accent); background: rgba(122,162,247,0.1); }
.quick-btns button.danger { color: var(--red); }
.quick-btns button.danger:hover { border-color: var(--red); background: rgba(247,118,142,0.1); }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 4px; font-family: monospace; font-size: 13px; outline: none; }
.input-row input:focus { border-color: var(--accent); }
.input-row button { background: var(--accent); border: none; color: var(--bg); padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; }
.input-row button:hover { opacity: 0.9; }
.input-row button:disabled { opacity: 0.4; cursor: default; }

/* Status bar */
.statusbar { padding: 4px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--dim); display: flex; gap: 16px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <h1>AImux</h1>
  <button onclick="refreshTree()">Refresh</button>
  <span style="flex:1"></span>
  <span class="mode-indicator" id="mode-label"></span>
  <button id="mode-btn" onclick="toggleMode()"></button>
</header>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="pane-header" id="pane-header" style="display:none">
      <span id="hdr-pane-id"></span>
      <span id="hdr-agent"></span>
      <span id="hdr-cwd" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <span class="state-badge" id="hdr-state"></span>
    </div>
    <div class="terminal-text empty" id="terminal-text">Select a pane from the sidebar</div>
    <div id="xterm-container"></div>
    <div id="jsonl-view"></div>
    <div class="controls" id="controls" style="display:none">
      <div class="quick-btns">
        <button onclick="sendQuick('C-c')" class="danger" title="Ctrl+C">Ctrl+C</button>
        <button onclick="sendQuick('Escape')" title="Escape">Esc</button>
        <button onclick="sendText('y')" title="y + Enter">y&crarr;</button>
        <button onclick="sendText('n')" title="n + Enter">n&crarr;</button>
        <button onclick="sendQuick('Enter')" title="Enter">Enter</button>
        <button onclick="sendQuick('C-d')" class="danger" title="Ctrl+D">Ctrl+D</button>
        <button onclick="sendQuick('C-z')" title="Ctrl+Z">Ctrl+Z</button>
        <button onclick="sendText('q')" title="q + Enter">q&crarr;</button>
      </div>
      <div class="input-row">
        <input type="text" id="cmd-input" placeholder="Type command and press Enter..." autocomplete="off">
        <button id="send-btn" onclick="sendInput()">Send</button>
      </div>
    </div>
    <div class="statusbar" id="statusbar" style="display:none">
      <span id="status-state"></span>
      <span id="status-agent"></span>
      <span id="status-cwd"></span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
// --- State ---
let activePaneId = null;
let eventSource = null;
let currentState = '';
let streamTimer = null;
const STREAM_DELAY = 5000;

// --- Display mode: 'text', 'xterm', or 'jsonl' ---
const urlMode = (new URLSearchParams(window.location.search)).get('mode');
let displayMode = ['text', 'xterm', 'jsonl'].includes(urlMode) ? urlMode : 'xterm';
let xterm = null;
let xtermReady = false;
let jsonlTimer = null;

function initXterm(cols, rows) {
  if (xterm) return;
  xterm = new Terminal({
    cursorBlink: false,
    cursorStyle: 'bar',
    disableStdin: true,
    scrollback: 0,
    cols: cols || 80,
    rows: rows || 24,
    fontSize: 13,
    fontFamily: '"JetBrains Mono", "Fira Code", "Cascadia Code", monospace',
    theme: {
      background: '#1a1b26',
      foreground: '#c0caf5',
      cursor: '#c0caf5',
      black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
      blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
      brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a',
      brightYellow: '#e0af68', brightBlue: '#7aa2f7', brightMagenta: '#bb9af7',
      brightCyan: '#7dcfff', brightWhite: '#c0caf5',
    },
  });
  xterm.open(document.getElementById('xterm-container'));
  xtermReady = true;
}

function resizeXterm(cols, rows) {
  if (!xterm || !xtermReady) return;
  if (xterm.cols !== cols || xterm.rows !== rows) {
    xterm.resize(cols, rows);
  }
}

function applyMode() {
  const modeBtn = document.getElementById('mode-btn');
  const modeLabel = document.getElementById('mode-label');
  const textEl = document.getElementById('terminal-text');
  const xtermEl = document.getElementById('xterm-container');
  const jsonlEl = document.getElementById('jsonl-view');

  textEl.style.display = 'none';
  xtermEl.style.display = 'none';
  jsonlEl.style.display = 'none';
  stopJsonlPolling();

  if (displayMode === 'xterm') {
    modeLabel.textContent = 'Terminal mode';
    modeBtn.textContent = 'Switch to JSON';
    xtermEl.style.display = 'block';
  } else if (displayMode === 'jsonl') {
    modeLabel.textContent = 'Conversation mode';
    modeBtn.textContent = 'Switch to Text';
    jsonlEl.style.display = 'block';
  } else {
    modeLabel.textContent = 'Text mode';
    modeBtn.textContent = 'Switch to Terminal';
    textEl.style.display = '';
  }

  // Re-fetch current pane in new mode
  if (activePaneId) {
    stopStream();
    if (displayMode === 'jsonl') {
      fetchJsonl(activePaneId);
      startJsonlPolling(activePaneId);
    } else {
      fetchCapture(activePaneId);
      scheduleStream(activePaneId);
    }
  }
}

function toggleMode() {
  const modes = ['xterm', 'jsonl', 'text'];
  const idx = modes.indexOf(displayMode);
  displayMode = modes[(idx + 1) % modes.length];
  applyMode();
}

// --- Helpers ---
function isScrolledToBottom(el) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < 30;
}

function useAnsi() { return displayMode === 'xterm' ? 1 : 0; }

const AGENT_LABELS = {
  claude: 'Claude Code', codex: 'Codex', gemini: 'Gemini',
  shell: 'Shell', other: 'Other', 'unknown-node': 'Node(?)'
};

// --- Tree ---
async function refreshTree() {
  try {
    const resp = await fetch('/api/tree');
    const tree = await resp.json();
    renderTree(tree);
  } catch (e) {
    console.error('Failed to fetch tree:', e);
  }
}

function renderTree(tree) {
  const sb = document.getElementById('sidebar');
  let html = '';
  for (const sess of tree) {
    html += `<div class="sess-name">${esc(sess.session)}</div>`;
    for (const win of sess.windows) {
      if (sess.windows.length > 1) {
        html += `<div class="win-label">window ${win.index}</div>`;
      }
      for (const pane of win.panes) {
        const isActive = pane.id === activePaneId ? ' active' : '';
        const label = AGENT_LABELS[pane.agent] || pane.command;
        const project = pane.cwd.split('/').pop();
        html += `<div class="pane-item${isActive}" data-pane="${esc(pane.id)}" onclick="selectPane(this)" title="${esc(pane.cwd)}">
          <span class="dot ${pane.state}"></span>
          <span class="pane-id">${esc(pane.id)}</span>
          <span class="pane-agent">${esc(label)}</span>
          <span style="margin-left:auto;color:var(--dim);font-size:11px">${esc(project)}</span>
        </div>`;
      }
    }
  }
  sb.innerHTML = html;
}

// --- Pane selection ---
function selectPane(el) {
  const paneId = el.dataset.pane;
  if (paneId === activePaneId) return;

  document.querySelectorAll('.pane-item.active').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  activePaneId = paneId;

  document.getElementById('pane-header').style.display = 'flex';
  document.getElementById('controls').style.display = 'block';
  document.getElementById('statusbar').style.display = 'flex';

  const agent = el.querySelector('.pane-agent').textContent;
  const cwd = el.title;
  document.getElementById('hdr-pane-id').textContent = paneId;
  document.getElementById('hdr-agent').textContent = agent;
  document.getElementById('hdr-cwd').textContent = cwd;

  stopStream();
  stopJsonlPolling();
  if (displayMode === 'jsonl') {
    fetchJsonl(paneId);
    startJsonlPolling(paneId);
  } else {
    fetchCapture(paneId);
    scheduleStream(paneId);
  }
}

// --- SSE Stream (lazy connection) ---
function stopStream() {
  if (streamTimer) { clearTimeout(streamTimer); streamTimer = null; }
  if (eventSource) { eventSource.close(); eventSource = null; }
}

async function fetchCapture(paneId) {
  const id = paneId.replace('%', '');
  if (displayMode === 'text') {
    const term = document.getElementById('terminal-text');
    term.className = 'terminal-text';
    term.textContent = 'Loading...';
    try {
      const resp = await fetch(`/api/pane/${id}/capture`);
      const data = await resp.json();
      if (activePaneId !== paneId) return;
      const atBottom = isScrolledToBottom(term);
      term.textContent = data.content;
      updateState(data.state);
      if (atBottom) term.scrollTop = term.scrollHeight;
    } catch (e) {
      if (activePaneId === paneId) term.textContent = `Error: ${e.message}`;
    }
  } else {
    try {
      const resp = await fetch(`/api/pane/${id}/capture?ansi=1`);
      const data = await resp.json();
      if (activePaneId !== paneId) return;
      if (!xtermReady) {
        initXterm(data.cols, data.rows);
      } else if (data.cols && data.rows) {
        resizeXterm(data.cols, data.rows);
      }
      xterm.reset();
      xterm.write(data.content);
      updateState(data.state);
    } catch (e) {
      if (activePaneId === paneId) {
        if (!xtermReady) initXterm(80, 24);
        xterm.reset(); xterm.write(`Error: ${e.message}`);
      }
    }
  }
}

function scheduleStream(paneId) {
  streamTimer = setTimeout(() => {
    streamTimer = null;
    if (activePaneId === paneId) startStream(paneId);
  }, STREAM_DELAY);
}

function ensureStream() {
  if (eventSource || !activePaneId) return;
  if (streamTimer) { clearTimeout(streamTimer); streamTimer = null; }
  startStream(activePaneId);
}

function startStream(paneId) {
  if (eventSource) { eventSource.close(); eventSource = null; }

  const id = paneId.replace('%', '');
  const ansi = useAnsi();
  eventSource = new EventSource(`/api/pane/${id}/stream?ansi=${ansi}`);

  eventSource.onmessage = (event) => {
    if (activePaneId !== paneId) { eventSource.close(); eventSource = null; return; }
    const data = JSON.parse(event.data);
    if (data.error) {
      if (displayMode === 'text') {
        document.getElementById('terminal-text').textContent = `Error: ${data.error}`;
      } else {
        xterm.reset(); xterm.write(`Error: ${data.error}`);
      }
      eventSource.close(); eventSource = null;
      return;
    }
    if (displayMode === 'text') {
      const term = document.getElementById('terminal-text');
      const atBottom = isScrolledToBottom(term);
      term.textContent = data.content;
      if (atBottom) term.scrollTop = term.scrollHeight;
    } else {
      if (data.cols && data.rows) resizeXterm(data.cols, data.rows);
      xterm.write('\x1b[H\x1b[J' + data.content);
    }
    currentState = data.state;
    updateState(data.state);
  };

  eventSource.onerror = () => { console.warn('SSE connection error, reconnecting...'); };
}

function updateState(state) {
  const badge = document.getElementById('hdr-state');
  badge.className = `state-badge ${state}`;
  badge.textContent = state.replace('_', ' ');
  document.getElementById('status-state').textContent = `state: ${state}`;
  document.getElementById('status-agent').textContent = `pane: ${activePaneId}`;
}

// --- Send keys ---
async function sendKeys(keys) {
  if (!activePaneId) return;
  const id = activePaneId.replace('%', '');
  try {
    await fetch(`/api/pane/${id}/keys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keys }),
    });
    ensureStream();
  } catch (e) {
    console.error('Failed to send keys:', e);
  }
}

function sendQuick(key) { sendKeys([key]); }
function sendText(text) { sendKeys([text, 'Enter']); }

function sendInput() {
  const input = document.getElementById('cmd-input');
  const text = input.value;
  if (!text) return;
  sendKeys([text, 'Enter']);
  input.value = '';
  input.focus();
}

document.getElementById('cmd-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); sendInput(); }
});

// --- JSONL / Conversation view ---
async function fetchJsonl(paneId) {
  const id = paneId.replace('%', '');
  const view = document.getElementById('jsonl-view');
  view.innerHTML = '<div class="jsonl-empty">Loading conversation...</div>';
  try {
    const resp = await fetch(`/api/pane/${id}/jsonl?limit=40`);
    const data = await resp.json();
    if (activePaneId !== paneId) return;
    if (data.error && !data.messages.length) {
      view.innerHTML = `<div class="jsonl-empty">${esc(data.error)}</div>`;
      return;
    }
    renderJsonl(data, view);
  } catch (e) {
    if (activePaneId === paneId) {
      view.innerHTML = `<div class="jsonl-empty">Error: ${esc(e.message)}</div>`;
    }
  }
}

function renderJsonl(data, container) {
  let html = '';
  if (data.session_file) {
    html += `<div class="jsonl-meta">Session: ${esc(data.session_file)} &middot; Agent: ${esc(data.agent)}</div>`;
  }
  if (!data.messages || !data.messages.length) {
    html += '<div class="jsonl-empty">No conversation messages found</div>';
    container.innerHTML = html;
    return;
  }
  for (const msg of data.messages) {
    const role = msg.role || 'unknown';
    const roleLabel = role === 'user' ? 'User' : role === 'assistant' ? 'Assistant' : 'System';
    html += `<div class="conv-msg ${esc(role)}">`;
    html += `<div class="conv-role ${esc(role)}">${roleLabel}</div>`;
    if (msg.content) {
      html += `<div class="conv-body">${renderMarkdown(msg.content)}</div>`;
    }
    if (msg.tools && msg.tools.length) {
      html += '<div class="conv-tools">';
      for (const tool of msg.tools) {
        html += `<span class="conv-tool">${esc(tool.name)}</span>`;
        if (tool.input_preview) {
          html += `<div class="conv-tool-preview">${esc(tool.input_preview)}</div>`;
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }
  const atBottom = isScrolledToBottom(container);
  container.innerHTML = html;
  if (atBottom) container.scrollTop = container.scrollHeight;
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    try { return marked.parse(text); } catch(e) {}
  }
  // Fallback: escape and preserve newlines
  return '<p>' + esc(text).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
}

function startJsonlPolling(paneId) {
  stopJsonlPolling();
  jsonlTimer = setInterval(() => {
    if (activePaneId === paneId && displayMode === 'jsonl') {
      fetchJsonl(paneId);
    } else {
      stopJsonlPolling();
    }
  }, 5000);
}

function stopJsonlPolling() {
  if (jsonlTimer) { clearInterval(jsonlTimer); jsonlTimer = null; }
}

// --- Util ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Init ---
applyMode();
refreshTree();
setInterval(refreshTree, 10000);

</script>

</body>
</html>
